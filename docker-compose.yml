services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: voice-chat-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./:/app
      - uploads_data:/app/uploads
    command: poetry run uvicorn app.main:asgi_app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: voice-chat-worker
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./:/app
    command: poetry run python -m app.workers.email_worker

  mongo:
    image: mongo:7
    container_name: voicechat_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: voice_chat
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      # - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      # - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo

  # Optional: SMTP test server with web UI at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: voicechat_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # Optional: S3-compatible object storage (MinIO)
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: voicechat_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 endpoint
      - "9001:9001" # MinIO console
    volumes:
      - minio_data:/data

  redis:
    image: redis:7
    container_name: voicechat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  coturn:
    image: coturn/coturn:latest
    container_name: voicechat_coturn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    command:
      - -n
      - --use-auth-secret
      - --static-auth-secret=voicechat-turn-secret
      - --realm=voicechat.local
      - --listening-ip=0.0.0.0
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-software-attribute
      - --fingerprint

  rabbitmq:
    image: rabbitmq:3-management
    container_name: voicechat_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api_test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechat_api_test
    env_file:
      - .env.test
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles: ["test"]
    volumes:
      - ./:/app
      - uploads_data:/app/uploads_test
    ports:
      - "8001:8000"
    command: poetry run uvicorn app.main:asgi_app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 5s
      timeout: 5s
      retries: 20

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechat_tests
    env_file:
      - .env.test
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api_test:
        condition: service_healthy
    volumes:
      - ./:/app
      - uploads_data:/app/uploads_test
    profiles: [ "test" ]
    command: poetry run pytest -v app/tests

volumes:
  mongo_data:
  uploads_data:
  minio_data:
